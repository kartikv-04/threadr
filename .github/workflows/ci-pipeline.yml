name: CI/CD Pipeline

on: 
  push: 
    branches: 
      - main
  pull_request: 
    branches: 
      - main
      - staging

jobs: 
  test-backend: 
    name: Test Backend 
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Github Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '24'
      
      - name: Install and Run Tests
        run: | 
          cd backend
          npm ci 
          npm run lint
          npm run test

  test-frontend: 
    name: Test Frontend 
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Github Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '24'
      
      - name: Install and Build Frontend
        run: | 
          cd frontend
          npm install 
          npm run lint
          npm run test
          npm run build
