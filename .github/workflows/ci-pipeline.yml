name: CI/CD Pipeline

on: 
  push: 
    branches: 
      - main
  pull_request: 
    branches: 
      - main
      - staging

jobs: 
  test-backend: 
    name: Test Backend 
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Github Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '24'
      
      - name: Install and Run Tests
        run: | 
          cd backend
          npm ci 
          npm run lint
          npm run test

  test-frontend: 
    name: Test Frontend 
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Github Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '24'
      
      - name: Install and Build Frontend
        run: | 
          cd frontend
          npm ci 
          npm run lint
          npm run test
          npm run build

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only push Docker images if merging into main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout GitHub Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/threadr-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/threadr-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/threadr-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/threadr-frontend:${{ github.sha }}